
                <html>
                <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <script src="https://cdn.tailwindcss.com"></script>
                    <script>
                        window.FontAwesomeConfig = {
                            autoReplaceSvg: 'nest', // Options: 'nest', 'remove', 'replace'
                        };
                    </script>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
                    <style>
                    </style>
                    <script>
                    tailwind.config = {
                    theme: {
                        extend: {
                        colors: {
                            primary: {"50":"#fafafa","100":"#f5f5f5","200":"#e5e5e5","300":"#d4d4d4","400":"#a3a3a3","500":"#737373","600":"#525252","700":"#404040","800":"#262626","900":"#171717","950":"#0a0a0a"}
                        }
                        }
                    }
                    }
                </script>
                </head>

                <body>
                        <div id="main-app" class="min-h-screen bg-white">
  
  <div id="signup-screen" class="flex items-center justify-center h-[1024px] bg-gradient-to-br from-neutral-50 to-neutral-100">
    <div class="w-full max-w-lg px-8">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-24 h-24 mb-6 bg-gradient-to-r from-neutral-800 to-neutral-600 rounded-2xl">
          <i class="fa-solid fa-gem text-white text-4xl"></i>
        </div>
        <h1 class="text-4xl text-neutral-900 mb-3">Prism Studio</h1>
        <p class="text-neutral-600 text-lg">웨딩 사진 보정 서비스</p>
      </div>

      <div class="bg-white rounded-2xl shadow-lg border border-neutral-200 p-8">
        <h2 class="text-2xl text-neutral-900 mb-6 text-center">회원가입</h2>
        
        <form class="space-y-6">
          <div>
            <label class="block text-sm text-neutral-900 mb-2">이름</label>
            <input type="text" placeholder="이름을 입력하세요" class="w-full px-4 py-3 border border-neutral-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent">
          </div>

          <div>
            <label class="block text-sm text-neutral-900 mb-2">이메일</label>
            <input type="email" placeholder="이메일을 입력하세요" class="w-full px-4 py-3 border border-neutral-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent">
          </div>

          <div>
            <label class="block text-sm text-neutral-900 mb-2">비밀번호</label>
            <div class="relative">
              <input type="password" placeholder="비밀번호를 입력하세요" class="w-full px-4 py-3 pr-12 border border-neutral-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent">
              <button type="button" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-neutral-500 hover:text-neutral-700">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <p class="text-xs text-neutral-500 mt-1">8자 이상, 영문, 숫자, 특수문자 포함</p>
          </div>

          <div>
            <label class="block text-sm text-neutral-900 mb-2">비밀번호 확인</label>
            <div class="relative">
              <input type="password" placeholder="비밀번호를 다시 입력하세요" class="w-full px-4 py-3 pr-12 border border-neutral-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent">
              <button type="button" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-neutral-500 hover:text-neutral-700">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="space-y-3">
            <div class="flex items-start gap-3">
              <input type="checkbox" id="terms" class="mt-1 w-4 h-4 text-neutral-900 bg-white border-neutral-300 rounded focus:ring-neutral-900 focus:ring-2">
              <label for="terms" class="text-sm text-neutral-700">
                <span class="text-neutral-500">*</span> <a href="#" class="text-neutral-900 hover:underline">서비스 이용약관</a>에 동의합니다
              </label>
            </div>
            
            <div class="flex items-start gap-3">
              <input type="checkbox" id="privacy" class="mt-1 w-4 h-4 text-neutral-900 bg-white border-neutral-300 rounded focus:ring-neutral-900 focus:ring-2">
              <label for="privacy" class="text-sm text-neutral-700">
                <span class="text-neutral-500">*</span> <a href="#" class="text-neutral-900 hover:underline">개인정보 처리방침</a>에 동의합니다
              </label>
            </div>
            
            <div class="flex items-start gap-3">
              <input type="checkbox" id="marketing" class="mt-1 w-4 h-4 text-neutral-900 bg-white border-neutral-300 rounded focus:ring-neutral-900 focus:ring-2">
              <label for="marketing" class="text-sm text-neutral-700">
                마케팅 정보 수신에 동의합니다 (선택)
              </label>
            </div>
          </div>

          <button type="submit" class="w-full bg-neutral-900 hover:bg-neutral-800 text-white py-4 px-6 rounded-xl transition-colors">
            회원가입
          </button>
        </form>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-neutral-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-neutral-500">또는</span>
          </div>
        </div>

        <button class="w-full bg-[#03C75A] hover:bg-[#02b350] text-white py-4 px-6 rounded-xl flex items-center justify-center gap-3 transition-colors">
          <i class="fa-solid fa-n text-xl"></i>
          <span>네이버로 회원가입</span>
        </button>

        <p class="text-center text-neutral-500 text-sm mt-6">
          이미 계정이 있으신가요? <a href="#" class="text-neutral-900 hover:underline">로그인</a>
        </p>
      </div>

      <div class="mt-8 text-center text-neutral-400 text-xs">
        <p>© 2025 Prism Studio. All rights reserved.</p>
      </div>
    </div>
  </div>

  <div id="signup-success-screen" class="hidden flex items-center justify-center h-[1024px] bg-gradient-to-br from-neutral-50 to-neutral-100">
    <div class="w-full max-w-md px-8 text-center">
      
      <div class="inline-flex items-center justify-center w-24 h-24 mb-6 bg-gradient-to-r from-neutral-800 to-neutral-600 rounded-2xl">
        <i class="fa-solid fa-check text-white text-4xl"></i>
      </div>
      
      <h1 class="text-3xl text-neutral-900 mb-3">회원가입 완료!</h1>
      <p class="text-neutral-600 text-lg mb-8">Prism Studio에 오신 것을 환영합니다</p>

      <div class="bg-white rounded-2xl shadow-lg border border-neutral-200 p-8 mb-8">
        <div class="flex items-center gap-4 mb-6">
          <img src="https://api.dicebear.com/7.x/notionists/svg?scale=200&seed=789" alt="Avatar" class="w-16 h-16 rounded-full border-2 border-neutral-200">
          <div class="text-left">
            <h3 class="text-xl text-neutral-900">김웨딩님</h3>
            <p class="text-neutral-600">wedding@example.com</p>
          </div>
        </div>
        
        <p class="text-neutral-700 mb-6">
          이제 웨딩 사진을 업로드하고 전문가의 보정 서비스를 이용하실 수 있습니다.
        </p>

        <div class="space-y-3">
          <button class="w-full bg-neutral-900 hover:bg-neutral-800 text-white py-3 px-6 rounded-xl transition-colors">
            바로 시작하기
          </button>
          
          <button class="w-full bg-white hover:bg-neutral-50 text-neutral-900 py-3 px-6 rounded-xl border border-neutral-300 transition-colors">
            로그인 화면으로
          </button>
        </div>
      </div>

      <div class="text-center text-neutral-400 text-xs">
        <p>© 2025 Prism Studio. All rights reserved.</p>
      </div>
    </div>
  </div>

</div>
                        </body>
                        </html>
